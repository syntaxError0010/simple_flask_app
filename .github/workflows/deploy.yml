name: CI/CD — Build & Deploy to EC2

on:
  push:
    branches:
      - main          # Deploy on every push to main
  pull_request:
    branches:
      - main          # Run CI checks on PRs (no deploy)

env:
  IMAGE_NAME: my-flask-app
  CONTAINER_NAME: flask-app

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Continuous Integration: lint + test
  # ────────────────────────────────────────────────────────────────
  ci:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Fail on syntax errors or undefined names; warn on style
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app.py --count --max-line-length=150 --statistics

      - name: Run tests
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Build Docker image & push to Docker Hub
  # ────────────────────────────────────────────────────────────────
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci                         # Only runs if CI passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "📦 Image tag: $SHORT_SHA"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to EC2 via SSH
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build                      # Only runs after successful build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: http://${{ vars.EC2_HOST }}

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          port:        ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -e  # Exit immediately on any error

            echo "──────────────────────────────────────"
            echo "  🐳 Logging in to Docker Hub"
            echo "──────────────────────────────────────"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "──────────────────────────────────────"
            echo "  📥 Pulling latest image"
            echo "──────────────────────────────────────"
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            echo "──────────────────────────────────────"
            echo "  🔄 Restarting container"
            echo "──────────────────────────────────────"
            # Stop & remove old container (ignore errors if it doesn't exist)
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm   ${{ env.CONTAINER_NAME }} || true

            # Start new container with env vars injected from EC2 environment
            docker run -d \
              --name    ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p        80:5000 \
              -e        APP_NAME="${{ secrets.APP_NAME }}" \
              -e        APP_ENV="production" \
              -e        APP_VERSION="${{ needs.build.outputs.image_tag }}" \
              -e        APP_AUTHOR="${{ secrets.APP_AUTHOR }}" \
              -e        SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            echo "──────────────────────────────────────"
            echo "  🧹 Cleaning up old images"
            echo "──────────────────────────────────────"
            docker image prune -f

            echo "──────────────────────────────────────"
            echo "  ✅ Deployment complete!"
            docker ps --filter "name=${{ env.CONTAINER_NAME }}"
            echo "──────────────────────────────────────"